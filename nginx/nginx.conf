worker_rlimit_nofile 8192;  # OS 파일 디스크립터 한도 올리기

events {
    worker_connections 4096;
}

http {
    # upstream: 요청을 분배할 backend 서버 목록
    # 별도 설정 없으면 nginx 기본값인 Round Robin으로 동작
    upstream backend_servers {
        server backend1:8080;
        server backend2:8080;
        server backend3:8080;
    }
    server {
        listen 80;

        # / 로 오는 요청 → frontend 컨테이너로
        location / {
            proxy_pass http://frontend:80;
        }

        # /api 로 오는 요청 → backend 컨테이너로
        location /api {
            # 컨테이너 이름 하나 대신 upstream 이름으로 교체
            proxy_pass http://backend_servers;

            # 실제 클라이언트 IP를 backend로 전달 (로그/보안용)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
        }
    }
}